<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Live Instrument Cluster</title>
    <style>
      :root {
        --bg: #060611;
        --panel: #0c0f22;
        --line: #f7f1dc;
        --green: #7dff57;
        --lime: #a5ff4d;
        --yellow: #ffe760;
        --red: #ff4b3a;
        --orange: #ff9a2f;
        --text: #f6f0dc;
      }
      html, body {
        margin: 0;
        background: radial-gradient(circle at 50% 45%, #151433 0%, #080914 55%, #03040a 100%);
        color: var(--text);
        font-family: "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
        overflow: hidden;
      }
      .shell {
        width: 100vw;
        height: 100vh;
        display: grid;
        place-items: center;
      }
      canvas {
        width: min(92vw, 92vh);
        height: min(92vw, 92vh);
        aspect-ratio: 1;
        display: block;
      }
      .hud {
        position: fixed;
        left: 16px;
        bottom: 16px;
        background: rgba(6, 8, 18, 0.78);
        border: 1px solid rgba(255,255,255,0.12);
        padding: 10px 12px;
        border-radius: 10px;
        font-size: 12px;
        line-height: 1.45;
        min-width: 220px;
        backdrop-filter: blur(10px);
      }
      .status {
        position: fixed;
        top: 16px;
        right: 16px;
        font-size: 12px;
        color: #c8ffb2;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <canvas id="cluster" width="1200" height="1200"></canvas>
    </div>
    <div class="status" id="ws-status">Feed: connecting</div>
    <div class="hud" id="meta">
      <div>Track: -</div>
      <div>Lap: - / -</div>
      <div>Pos: -</div>
      <div>Strategy: -</div>
    </div>
    <script src="./app.js"></script>
  </body>
  </html>
